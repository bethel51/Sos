name: Silent SOS CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level=high || true

    - name: Run Integration Tests
      run: npm test
      env:
        NODE_ENV: test
        JWT_SECRET: testing_jwt_secret_token_123_abc
        ADMIN_TOKEN: admin_secret_token
        # Fallback to local MongoDB service if secret MONGODB_URI is not provided
        MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/leadcity-sos' }}
        BREVO_API_KEY: "${{ secrets.BREVO_API_KEY }}"
        SMTP_HOST: smtp-relay.brevo.com
        SMTP_PORT: 587
        SMTP_USER: "${{ secrets.SMTP_USER }}"
        SMTP_PASS: "${{ secrets.SMTP_PASS }}"
        BREVO_SENDER: SilentSOS
        CORS_ORIGIN: "*"

    - name: Run production build
      run: npm run build
